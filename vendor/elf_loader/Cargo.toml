default-features = false

[dependencies.portable-atomic-util]
version = "0.2.5"
features = ["alloc"]
optional = true
default-features = false

[dependencies.spin]
version = "0.10"
features = [
    "mutex",
    "rwlock",
    "spin_mutex",
]
default-features = false

[dependencies.syscalls]
version = "0.8.1"
optional = true

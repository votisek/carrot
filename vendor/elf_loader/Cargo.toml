log = ["dep:log"]
portable-atomic = [
    "dep:portable-atomic",
    "dep:portable-atomic-util",
    "spin/portable_atomic",
]
use-syscall = ["dep:syscalls"]
version = []

[lib]
name = "elf_loader"
path = "src/lib.rs"

[[bench]]
name = "benchmark"
path = "benches/benchmark.rs"
harness = false

[dependencies.bitflags]
version = "2.9.0"

[dependencies.cfg-if]
version = "1.0"

[dependencies.elf]
version = "0.8"

[package]
edition = "2024"
rust-version = "1.93.0"
name = "elf_loader"
version = "0.14.0"
authors = ["wzhao <1207410841@qq.com>"]
build = "build.rs"
exclude = [
    ".gitignore",
    "ci",
    "tests",
    "examples",
    "docs",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A high-performance, no_std compliant ELF loader and JIT linker for Rust."
readme = "README.md"
keywords = [
    "elf",
    "loader",
    "jit",
    "linker",
    "no-std",
]
categories = [
    "no-std",
    "embedded",
    "os",
    "parsing",
    "development-tools",
]
license = "MIT/Apache-2.0"
